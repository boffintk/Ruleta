<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ruleta Interactiva Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121214;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- MENÚ DE INICIO --- */
        #mainMenu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #1e1e24 0%, #121214 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 20px;
            text-align: center;
        }

        #mainMenu h1 {
            font-size: 3rem;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.4);
            margin-bottom: 20px;
        }

        .menu-btn {
            background: #00ff88;
            color: #121214;
            font-size: 1.4rem;
            padding: 20px 40px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.2);
        }

        .menu-btn.secondary {
            background: #3498db;
            color: white;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
        }

        /* --- JUEGO PRINCIPAL --- */
        .game-header {
            display: flex;
            width: 100%;
            max-width: 1100px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.8rem;
            color: #00ff88;
        }

        .btn-back {
            background: #3a3a44;
            color: white;
            padding: 8px 15px;
            font-size: 0.9rem;
        }

        .container {
            display: flex;
            flex-direction: row;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
            align-items: flex-start;
            justify-content: center;
        }

        .wheel-container {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 340px;
        }

        canvas {
            background: transparent;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(0,0,0,0.5), 0 0 5px #00ff88;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
            max-width: 100%;
            height: auto;
        }

        .marker {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ff3366;
            z-index: 10;
        }

        .center-spin-btn {
            position: absolute;
            width: 75px;
            height: 75px;
            background: #fff;
            color: #121214;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
            z-index: 12;
            border: 4px solid #00ff88;
        }

        .controls-container {
            flex: 1;
            background: #1e1e24;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-height: 80vh;
            overflow-y: auto;
            width: 100%;
        }

        button {
            border: none;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        .options-list {
            margin-bottom: 20px;
        }

        .option-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 2;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #3a3a44;
            background: #2a2a35;
            color: #fff;
            font-size: 1rem;
        }

        input[type="number"] {
            width: 70px;
            padding: 12px 5px;
            border-radius: 8px;
            border: 1px solid #3a3a44;
            background: #2a2a35;
            color: #fff;
            font-size: 1rem;
            text-align: center;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            background: transparent;
        }

        input[type="color"]::-webkit-color-swatch {
            border-radius: 8px;
            border: 2px solid #3a3a44;
        }

        .btn-delete { background: #ff3366; color: white; padding: 12px; }
        .action-btns { display: flex; gap: 10px; }
        .action-btns button { flex: 1; }
        .btn-add { background: #3498db; color: white; }
        .btn-spin { background: #00ff88; color: #121214; font-size: 1.2rem; }

        /* --- POPUP DE RESULTADO (GANADOR) --- */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .popup-content {
            background: #1e1e24;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .popup-content h3 {
            font-size: 1.5rem;
            color: #aaa;
            margin-bottom: 10px;
        }

        .popup-winner-text {
            font-size: 2.5rem;
            color: #ffff00;
            font-weight: bold;
            margin-bottom: 30px;
            word-wrap: break-word;
        }

        .popup-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-remove-winner { background: #ff3366; color: white; font-size: 1.1rem; }
        .btn-keep-winner { background: #3a3a44; color: white; font-size: 1.1rem; }

        @media (max-width: 850px) {
            .container { flex-direction: column; align-items: center; }
            .wheel-container { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div id="mainMenu">
        <h1>🎡 Súper Ruleta</h1>
        <button class="menu-btn" onclick="startCustomMode()">🎮 Jugar Personalizada</button>
        <button class="menu-btn secondary" onclick="startTemplateMode()">🔢 Jugar Plantilla de Números</button>
    </div>

    <div class="game-header">
        <h2 id="gameTitle">Ruleta</h2>
        <button class="btn-back" onclick="goToMenu()">⬅ Menú principal</button>
    </div>

    <div class="container">
        <div class="wheel-container">
            <div class="marker"></div>
            <div class="center-spin-btn" id="centerSpin">GIRAR</div>
            <canvas id="wheelCanvas" width="450" height="450"></canvas>
        </div>

        <div class="controls-container">
            <div class="options-list" id="optionsContainer"></div>
            <div class="action-btns">
                <button class="btn-add" onclick="addOptionRow('', 1, getRandomColor())">➕ Añadir Opción</button>
                <button class="btn-spin" onclick="spinWheel()">¡GIRAR!</button>
            </div>
        </div>
    </div>

    <div class="popup-overlay" id="winnerPopup">
        <div class="popup-content">
            <h3>¡Ha salido!</h3>
            <div class="popup-winner-text" id="winnerText">ELEMENTO</div>
            <div class="popup-btns">
                <button class="btn-remove-winner" onclick="removeWinnerAction()">❌ Quitar de la ruleta y cerrar</button>
                <button class="btn-keep-winner" onclick="closePopup()">🔄 Dejar y Seguir Jugando</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const optionsContainer = document.getElementById('optionsContainer');
        const centerSpin = document.getElementById('centerSpin');
        const mainMenu = document.getElementById('mainMenu');
        const winnerPopup = document.getElementById('winnerPopup');
        const winnerText = document.getElementById('winnerText');
        const gameTitle = document.getElementById('gameTitle');

        let items = [];
        let isSpinning = false;
        let currentRotation = 0;
        let lastWinnerIndex = null; // Para recordar a quién quitar si se presiona el botón

        const defaultColors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#9b59b6', '#34495e', '#1abc9c', '#e67e22', '#ff6b81', '#20bf6b'];

        function getRandomColor() {
            return defaultColors[Math.floor(Math.random() * defaultColors.length)];
        }

        // --- MANEJO DEL MENÚ ---
        function startCustomMode() {
            mainMenu.style.display = 'none';
            gameTitle.innerText = "Modo Personalizado";
            optionsContainer.innerHTML = '';
            addOptionRow('Opción A', 1, '#ff4757');
            addOptionRow('Opción B', 1, '#2ed573');
            addOptionRow('Opción C', 1, '#1e90ff');
            updateWheel();
        }

        function startTemplateMode() {
            const quantityStr = prompt("¿Cuántos números quieres generar?", "10");
            const quantity = parseInt(quantityStr);
            
            if (isNaN(quantity) || quantity <= 0) {
                alert("Por favor inserta un número válido.");
                return;
            }

            mainMenu.style.display = 'none';
            gameTitle.innerText = `Plantilla: ${quantity} Números`;
            optionsContainer.innerHTML = ''; 

            for (let i = 1; i <= quantity; i++) {
                const color = defaultColors[(i - 1) % defaultColors.length];
                addOptionRow(`${i}`, 1, color);
            }
            updateWheel();
        }

        function goToMenu() {
            mainMenu.style.display = 'flex';
        }

        // --- SISTEMA DE FILAS DE OPCIONES ---
        function addOptionRow(text = '', weight = 1, color = '#ffffff') {
            const row = document.createElement('div');
            row.className = 'option-row';
            row.innerHTML = `
                <input type="text" class="opt-text" value="${text}" placeholder="Escribe algo..." oninput="updateWheel()">
                <input type="number" class="opt-weight" value="${weight}" min="1" title="Probabilidad (Peso)" oninput="updateWheel()">
                <input type="color" class="opt-color" value="${color}" onchange="updateWheel()">
                <button class="btn-delete" onclick="this.parentElement.remove(); updateWheel();">❌</button>
            `;
            optionsContainer.appendChild(row);
            updateWheel();
        }

        function getItemsFromInputs() {
            const rows = document.querySelectorAll('.option-row');
            items = [];
            rows.forEach((row, index) => {
                const text = row.querySelector('.opt-text').value.trim() || `Opción ${index + 1}`;
                const weight = parseFloat(row.querySelector('.opt-weight').value) || 1;
                const color = row.querySelector('.opt-color').value;
                // Guardamos la referencia de la fila del HTML para poder borrarla fácilmente si gana
                items.push({ text, weight, color, element: row });
            });
        }

        // --- DIBUJAR RULETA ---
        function updateWheel() {
            getItemsFromInputs();
            if (items.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            const totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 12;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let startAngle = 0;

            items.forEach((item) => {
                const sliceAngle = (item.weight / totalWeight) * 2 * Math.PI;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
                ctx.closePath();
                ctx.fillStyle = item.color;
                ctx.fill();
                ctx.strokeStyle = '#121214';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Añadir Texto
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px sans-serif";
                ctx.shadowBlur = 4;
                ctx.shadowColor = "rgba(0,0,0,0.8)";
                
                let txt = item.text;
                if(txt.length > 12) txt = txt.substring(0,10) + '..';
                ctx.fillText(txt, radius - 25, 6);
                ctx.restore();

                startAngle += sliceAngle;
            });
        }

        // --- LÓGICA DE GIRO Y GANADOR ---
        function spinWheel() {
            if (isSpinning || items.length === 0) return;
            isSpinning = true;

            const totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
            let randomWeight = Math.random() * totalWeight;
            let winningIndex = 0;

            for (let i = 0; i < items.length; i++) {
                randomWeight -= items[i].weight;
                if (randomWeight <= 0) {
                    winningIndex = i;
                    break;
                }
            }

            lastWinnerIndex = winningIndex;

            // Calcular el ángulo exacto para detenerse en la flecha de arriba (270°)
            let currentAngleSum = 0;
            for(let i=0; i<winningIndex; i++) {
                currentAngleSum += (items[i].weight / totalWeight) * 360;
            }
            const currentSliceSize = (items[winningIndex].weight / totalWeight) * 360;
            const targetDegrees = 270 - (currentAngleSum + (currentSliceSize / 2));

            const extraSpins = (Math.floor(Math.random() * 4) + 6) * 360; // 6-10 vueltas locas
            currentRotation = extraSpins + targetDegrees;

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Al finalizar los 4 segundos de la animación:
            setTimeout(() => {
                isSpinning = false;
                showWinnerPopup(items[winningIndex].text);
            }, 4000);
        }

        // --- ACCIONES DEL POPUP ---
        function showWinnerPopup(name) {
            winnerText.innerText = name;
            winnerPopup.style.display = 'flex';
        }

        function closePopup() {
            winnerPopup.style.display = 'none';
        }

        function removeWinnerAction() {
            if (lastWinnerIndex !== null && items[lastWinnerIndex]) {
                // Borramos la fila del HTML
                items[lastWinnerIndex].element.remove();
                // Actualizamos los datos internos y redibujamos
                updateWheel();
            }
            closePopup();
        }

        // Eventos táctiles para tablets en el centro de la ruleta
        centerSpin.addEventListener('click', spinWheel);
        centerSpin.addEventListener('touchstart', (e) => {
            e.preventDefault();
            spinWheel();
        });
    </script>
</body>
</html>
